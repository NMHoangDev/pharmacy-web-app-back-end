name: Backend CI/CD

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target_env:
        description: "Deploy target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        run: mvn -B -ntp clean test

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build all modules
        run: mvn -B -ntp -DskipTests clean package

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            **/target/*.jar
            !**/target/*-sources.jar
            !**/target/*-javadoc.jar

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.target_env == 'staging')
    environment: staging
    steps:
      - name: Download jar artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: deploy-artifacts

      - name: Deploy to staging
        run: |
          echo "Add your backend staging deployment command here"
          echo "Example: Docker build/push + kubectl apply, or SSH deployment"

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target_env == 'production')
    environment: production
    steps:
      - name: Download jar artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: deploy-artifacts

      - name: Deploy to production
        run: |
          echo "Add your backend production deployment command here"
          echo "Use environment secrets for credentials and tokens"
