spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: discount-service-admin
          uri: ${services.discount.uri:http://discount-service:7035}
          predicates:
            - Path=/admin/discounts/**

        - id: discount-service-user
          uri: ${services.discount.uri:http://discount-service:7035}
          predicates:
            - Path=/user/discounts/**

        - id: branch-service-public
          uri: ${services.branch.uri:http://branch-service:7030}
          predicates:
            - Path=/api/branches/**,/api/branches
        - id: auth-service
          uri: ${services.auth.uri:http://identity-service:7070}
          predicates:
            - Path=/api/auth/**
        - id: ai-service
          uri: ${services.ai.uri:http://ai-service:7036}
          predicates:
            - Path=/api/chat,/api/chat/**
        - id: media-service
          uri: ${services.media.uri:http://media-service:7021}
          predicates:
            - Path=/api/media/**
        - id: notification-service
          uri: ${services.notification.uri:http://notification-service:7022}
          predicates:
            - Path=/api/notifications/**
        - id: user-service
          uri: ${services.user.uri:http://user-service:7016}
          predicates:
            - Path=/api/users/**
        - id: cart-service
          uri: ${services.cart.uri:http://cart-service:7026}
          predicates:
            - Path=/api/cart/**,/api/cart
          filters:
            - PreserveHostHeader=true
        - id: order-service
          uri: ${services.order.uri:http://order-service:7019}
          predicates:
            - Path=/api/orders/**, /api/order/**, /api/checkout/**
        - id: appointment-service
          uri: ${services.appointment.uri:http://appointment-service:7024}
          predicates:
            - Path=/api/appointments/**, /api/appointments, /api/consultations/**, /ws/**
        - id: review-service
          uri: ${services.review.uri:http://review-service:7023}
          predicates:
            - Path=/api/reviews/**
        - id: inventory-service
          uri: ${services.inventory.uri:http://inventory-service:7018}
          predicates:
            - Path=/api/inventory/**
        - id: content-service
          uri: ${services.content.uri:http://content-service:7031}
          predicates:
            - Path=/api/content/**
        - id: payment-service
          uri: ${services.payment.uri:http://payment-service:7020}
          predicates:
            - Path=/api/payments/**
        - id: catalog-public
          uri: ${services.catalog.uri:http://catalog-service:7017}
          predicates:
            - Path=/api/catalog/public/**
          order: -1
        - id: catalog-service
          uri: ${services.catalog.uri:http://catalog-service:7017}
          predicates:
            - Path=/api/catalog/**
          filters:
            - TokenRelay
        - id: pharmacist-service
          uri: ${services.pharmacist.uri:http://pharmacist-service:7025}
          predicates:
            - Path=/api/pharmacists/**
          filters:
            - TokenRelay
        - id: admin-pharmacist-service
          uri: ${services.pharmacist.uri:http://pharmacist-service:7025}
          predicates:
            - Path=/api/admin/pharmacists/**
          filters:
            - TokenRelay
          order: -1
        - id: admin-stats-users-bff
          uri: ${services.adminbff.uri:http://admin-bff-service:7010}
          predicates:
            - Path=/api/admin/users/stats
          filters:
            - TokenRelay
          order: -4
        - id: admin-stats-orders-bff
          uri: ${services.adminbff.uri:http://admin-bff-service:7010}
          predicates:
            - Path=/api/admin/orders/stats
          filters:
            - TokenRelay
          order: -4
        - id: admin-stats-medicines-bff
          uri: ${services.adminbff.uri:http://admin-bff-service:7010}
          predicates:
            - Path=/api/admin/medicines/stats
          filters:
            - TokenRelay
          order: -4
        - id: admin-order-service
          uri: ${services.order.uri:http://order-service:7019}
          predicates:
            - Path=/api/admin/orders/**
          filters:
            - TokenRelay
          order: -1
        - id: admin-appointment-service
          uri: ${services.appointment.uri:http://appointment-service:7024}
          predicates:
            - Path=/api/admin/appointments/**
          filters:
            - TokenRelay
          order: -1
        - id: admin-branch-service
          uri: ${services.branch.uri:http://branch-service:7030}
          predicates:
            - Path=/api/admin/branches/**,/api/admin/branches
          filters:
            - TokenRelay
          order: -2
        - id: admin-user-service-list
          uri: ${services.user.uri:http://user-service:7016}
          predicates:
            - Path=/api/admin/users
          filters:
            - TokenRelay
            - SetPath=/api/users
          order: -3
        - id: admin-user-service-detail
          uri: ${services.user.uri:http://user-service:7016}
          predicates:
            - Path=/api/admin/users/**
          filters:
            - TokenRelay
            - RewritePath=/api/admin/users/(?<segment>.*), /api/users/$\{segment}
          order: -3
        - id: admin-bff
          uri: ${services.adminbff.uri:http://admin-bff-service:7010}
          predicates:
            - Path=/api/admin/**
          filters:
            - TokenRelay

      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOriginPatterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://192.168.56.1:3000,http://localhost:3001,http://localhost:5173,http://localhost:*,https://*.pharmacare.vn}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Content-Disposition
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - RemoveRequestHeader=Cookie
        - RemoveRequestHeader=Set-Cookie
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_LAST
        - RequestSize=20MB
        - name: Retry
          args:
            retries: 2
            statuses: BAD_GATEWAY, GATEWAY_TIMEOUT, SERVICE_UNAVAILABLE
            methods: GET, POST, PUT, DELETE
            exceptions: java.net.ConnectException,java.net.SocketTimeoutException,io.netty.channel.ConnectTimeoutException,reactor.netty.http.client.PrematureCloseException
            backoff:
              firstBackoff: 150ms
              maxBackoff: 600ms
              factor: 2

      httpclient:
        connect-timeout: 5000
        response-timeout: 30s

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/pharmacy}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/pharmacy/protocol/openid-connect/certs}

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh,prometheus,gateway
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
