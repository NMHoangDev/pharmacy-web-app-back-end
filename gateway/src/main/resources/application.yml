spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: media-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/media/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: appointment-service
          uri: http://localhost:8093
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=1
        - id: review-service
          uri: http://localhost:8092
          predicates:
            - Path=/api/reviews/**
          filters:
            - StripPrefix=1
        - id: inventory-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: catalog-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=1
        - id: admin-bff
          uri: http://localhost:8099
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1

        # Optional direct admin services (uncomment if bypassing BFF)
        # - id: cms-service
        #   uri: http://localhost:8101
        #   predicates:
        #     - Path=/api/admin/cms/**
        #   filters:
        #     - StripPrefix=2
        # - id: reporting-service
        #   uri: http://localhost:8102
        #   predicates:
        #     - Path=/api/admin/reporting/**
        #   filters:
        #     - StripPrefix=2
        # - id: audit-service
        #   uri: http://localhost:8103
        #   predicates:
        #     - Path=/api/admin/audit/**
        #   filters:
        #     - StripPrefix=2
        # - id: settings-service
        #   uri: http://localhost:8104
        #   predicates:
        #     - Path=/api/admin/settings/**
        #   filters:
        #     - StripPrefix=2
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      default-filters:
        - RemoveRequestHeader=Cookie
        - RemoveRequestHeader=Set-Cookie
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_LAST
        - RequestSize=20MB
        - name: Retry
          args:
            retries: 2
            statuses: BAD_GATEWAY, GATEWAY_TIMEOUT, SERVICE_UNAVAILABLE
            methods: GET, POST, PUT, DELETE
        - name: CircuitBreaker
          args:
            name: backendCircuitBreaker
            fallbackUri: forward:/fallback

      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
      forwarded:
        enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:4040/realms/pharmacy
          jwk-set-uri: http://localhost:4040/realms/pharmacy/protocol/openid-connect/certs

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    reactor.netty.http.client: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{X-Correlation-Id}] %logger - %msg%n"
