spring:
  config:
    import: optional:configserver:http://config-server:8888
  application:
    name: gateway-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: branch-service-public
          uri: ${services.branch.uri:http://localhost:7030}
          predicates:
            - Path=/api/branches/**,/api/branches
          # Public endpoints; still pass through JWT if present.

        - id: auth-service
          uri: ${services.auth.uri:http://localhost:${IDENTITY_SERVER_PORT:7070}}
          predicates:
            - Path=/api/auth/**
        - id: media-service
          uri: http://localhost:7021
          predicates:
            - Path=/api/media/**
          # Do not strip prefix so media-service receives /api/media/**
        - id: notification-service
          uri: http://localhost:7022
          predicates:
            - Path=/api/notifications/**
        - id: user-service
          uri: http://127.0.0.1:7016
          predicates:
            - Path=/api/users/**
          # Do not strip prefix for user-service so it receives /api/users/**
        - id: cart-service
          uri: http://localhost:7026
          predicates:
            - Path=/api/cart/**,/api/cart
          # Do not strip prefix so cart-service receives /api/cart/**
          # preserve host header to avoid downstream mismatches
          filters:
            - PreserveHostHeader=true
        - id: order-service
          uri: http://localhost:7019
          predicates:
            - Path=/api/orders/**, /api/order/**, /api/checkout/**
          # Do not strip prefix so order-service receives /api/orders/** or /api/order/**
        - id: appointment-service
          uri: http://localhost:7024
          predicates:
            - Path=/api/appointments/**, /api/appointments, /api/consultations/**, /ws/**

        - id: review-service
          uri: http://localhost:7023
          predicates:
            - Path=/api/reviews/**
          # Do not strip prefix so review-service receives /api/reviews/**
        - id: inventory-service
          uri: http://localhost:7018
          predicates:
            - Path=/api/inventory/**
          # Do not strip prefix so inventory-service receives /api/inventory/**
        - id: content-service
          uri: http://localhost:7031
          predicates:
            - Path=/api/content/**
          # Do not strip prefix so content-service receives /api/content/**
        - id: payment-service
          uri: http://localhost:7020
          predicates:
            - Path=/api/payments/**
        - id: catalog-public
          uri: http://localhost:7017
          predicates:
            - Path=/api/catalog/public/**
          order: -1
        - id: catalog-service
          uri: http://localhost:7017
          predicates:
            - Path=/api/catalog/**
          filters:
            - TokenRelay
        - id: pharmacist-service
          uri: http://localhost:7025
          predicates:
            - Path=/api/pharmacists/**
          filters:
            - TokenRelay
        - id: admin-pharmacist-service
          uri: http://localhost:7025
          predicates:
            - Path=/api/admin/pharmacists/**
          filters:
            - TokenRelay
          order: -1
        - id: admin-order-service
          uri: http://localhost:7019
          predicates:
            - Path=/api/admin/orders/**
          filters:
            - TokenRelay
          order: -1
        - id: admin-appointment-service
          uri: http://localhost:7024
          predicates:
            - Path=/api/admin/appointments/**
          filters:
            - TokenRelay
          order: -1

        - id: admin-branch-service
          uri: ${services.branch.uri:http://localhost:7030}
          predicates:
            - Path=/api/admin/branches/**,/api/admin/branches
          filters:
            - TokenRelay
          order: -2
        - id: admin-bff
          uri: http://localhost:7010
          predicates:
            - Path=/api/admin/**
          filters:
            - TokenRelay
          # Do not strip prefix for admin-bff so the service receives the full path
          # (admin-bff controller is mapped to /api/admin/*)

      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOriginPatterns:
              - "http://localhost:*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      default-filters:
        - RemoveRequestHeader=Cookie
        - RemoveRequestHeader=Set-Cookie
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_LAST
        - RequestSize=20MB
        - name: Retry
          args:
            retries: 2
            statuses: BAD_GATEWAY, GATEWAY_TIMEOUT, SERVICE_UNAVAILABLE
            methods: GET, POST, PUT, DELETE
        - name: CircuitBreaker
          args:
            name: backendCircuitBreaker
            fallbackUri: forward:/fallback

      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      forwarded:
        enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/pharmacy}
    keycloak:
      roles-source: realm
      client-id: pharmacy-app

server:
  port: 8087
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh,prometheus
  health:
    kafka:
      enabled: false
    binders:
      enabled: false
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    org:
      springframework:
        cloud:
          gateway: DEBUG
        security: DEBUG
    reactor:
      netty:
        http:
          client: DEBUG
    # enable detailed gateway routing logs
    "[org.springframework.cloud.gateway.filter]": DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{X-Correlation-Id}] %logger - %msg%n"
