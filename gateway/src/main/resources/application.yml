spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${services.auth.uri:http://localhost:${IDENTITY_SERVER_PORT:7070}}
          predicates:
            - Path=/api/auth/**
        - id: media-service
          uri: http://localhost:7021
          predicates:
            - Path=/api/media/**
          # Do not strip prefix so media-service receives /api/media/**
        - id: notification-service
          uri: http://localhost:7022
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://127.0.0.1:7016
          predicates:
            - Path=/api/users/**
          # Do not strip prefix for user-service so it receives /api/users/**
        - id: cart-service
          uri: http://localhost:7026
          predicates:
            - Path=/api/cart/**,/api/cart
          # Do not strip prefix so cart-service receives /api/cart/**
          # preserve host header to avoid downstream mismatches
          filters:
            - PreserveHostHeader=true
        - id: order-service
          uri: http://localhost:7019
          predicates:
            - Path=/api/orders/**, /api/order/**
          # Do not strip prefix so order-service receives /api/orders/** or /api/order/**
        - id: appointment-service
          uri: http://localhost:7024
          predicates:
            - Path=/api/appointments/**, /api/appointments

        - id: review-service
          uri: http://localhost:7023
          predicates:
            - Path=/api/reviews/**
          # Do not strip prefix so review-service receives /api/reviews/**
        - id: inventory-service
          uri: http://localhost:7018
          predicates:
            - Path=/api/inventory/**
          # Do not strip prefix so inventory-service receives /api/inventory/**
        - id: payment-service
          uri: http://localhost:7020
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: catalog-service
          uri: http://localhost:7017
          predicates:
            - Path=/api/catalog/**
          # Do not strip prefix so services receive full path (/api/catalog/**)
        - id: pharmacist-service
          uri: http://localhost:7025
          predicates:
            - Path=/api/pharmacists/**
        - id: admin-pharmacist-service
          uri: http://localhost:7025
          predicates:
            - Path=/api/admin/pharmacists/**
          order: -1
        - id: admin-bff
          uri: http://localhost:7010
          predicates:
            - Path=/api/admin/**
          # Do not strip prefix for admin-bff so the service receives the full path
          # (admin-bff controller is mapped to /api/admin/*)

        # Optional direct admin services (uncomment if bypassing BFF)
        # - id: cms-service
        #   uri: http://localhost:7011
        #   predicates:
        #     - Path=/api/admin/cms/**
        #   filters:
        #     - StripPrefix=2
        # - id: reporting-service
        #   uri: http://localhost:7012
        #   predicates:
        #     - Path=/api/admin/reporting/**
        #   filters:
        #     - StripPrefix=2
        # - id: audit-service
        #   uri: http://localhost:7013
        #   predicates:
        #     - Path=/api/admin/audit/**
        #   filters:
        #     - StripPrefix=2
        # - id: settings-service
        #   uri: http://localhost:7014
        #   predicates:
        #     - Path=/api/admin/settings/**
        #   filters:
        #     - StripPrefix=2
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOriginPatterns:
              - "http://localhost:*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      default-filters:
        - RemoveRequestHeader=Cookie
        - RemoveRequestHeader=Set-Cookie
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_LAST
        - RequestSize=20MB
        - name: Retry
          args:
            retries: 2
            statuses: BAD_GATEWAY, GATEWAY_TIMEOUT, SERVICE_UNAVAILABLE
            methods: GET, POST, PUT, DELETE
        - name: CircuitBreaker
          args:
            name: backendCircuitBreaker
            fallbackUri: forward:/fallback

      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
      forwarded:
        enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${IDENTITY_JWT_SECRET:pR3F8z!kuQ9wS6vB1nX4cT7mY0aL2eH5rJ8kN1bV4pZ6sQ9uE3tW5yR7uI0oL2}

server:
  port: 8087
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org:
      springframework:
        cloud:
          gateway: DEBUG
        security: INFO
    reactor:
      netty:
        http:
          client: DEBUG
    # enable detailed gateway routing logs
    org.springframework.cloud.gateway.filter: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{X-Correlation-Id}] %logger - %msg%n"
