spring:
  application:
    name: pharmacist-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/pharmacist_db
    username: root
    password: 160525
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
server:
  port: ${SERVER_PORT:7025}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    org.hibernate.SQL: WARN
