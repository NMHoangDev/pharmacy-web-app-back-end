spring:
  config:
    import: optional:configserver:http://config-server:8888
  application:
    name: order-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/pharmacy}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/pharmacy/protocol/openid-connect/certs}
    keycloak:
      roles-source: realm
      client-id: pharmacy-app
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/order_db
    username: root
    password: 160525
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-payment-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
server:
  port: ${SERVER_PORT:7019}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  logging:
    level:
      org.springframework.web: DEBUG
      org.springframework.web.servlet.DispatcherServlet: DEBUG

order:
  branch-service:
    base-url: ${BRANCH_SERVICE_URL:http://localhost:7030}
  inventory-service:
    base-url: ${INVENTORY_SERVICE_URL:http://localhost:7018}
  catalog-service:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:7017}
  user-service:
    base-url: ${USER_SERVICE_URL:http://localhost:7016}
