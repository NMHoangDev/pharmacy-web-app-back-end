spring:
  config:
    import: optional:configserver:http://config-server:8888
  application:
    name: inventory-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/inventory_db
    username: root
    password: 160525
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        type:
          preferred_uuid_jdbc_type: CHAR
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
server:
  port: ${SERVER_PORT:7018}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
logging:
  level:
    org.hibernate.SQL: WARN
inventory:
  default-branch-id: ${INVENTORY_DEFAULT_BRANCH_ID:00000000-0000-0000-0000-000000000001}
  branch-service:
    base-url: ${BRANCH_SERVICE_URL:http://localhost:7030}
    cache-ttl-seconds: 60
