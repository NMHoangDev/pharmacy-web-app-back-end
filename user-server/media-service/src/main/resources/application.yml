spring:
  application:
    name: media-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8088
management:
  endpoints:
    web:
      exposure:
        include: health,info
s3:
  endpoint: http://127.0.0.1:9000 # MinIO endpoint; remove for AWS
  region: us-east-1
  access-key: minioadmin
  secret-key: minioadmin
  bucket-drugs: drug-media
  bucket-banners: banner-media
  presign-minutes: 30
