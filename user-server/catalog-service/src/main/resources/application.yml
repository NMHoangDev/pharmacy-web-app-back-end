spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/catalog_db
    username: root
    password: 160525
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
server:
  port: ${SERVER_PORT:7017}
  error:
    include-message: always
    include-stacktrace: always
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    org.hibernate.SQL: WARN
    com.backend.catalog: DEBUG
    org.springframework.web: DEBUG
