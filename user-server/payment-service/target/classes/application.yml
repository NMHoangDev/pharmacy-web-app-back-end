spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://<host>:5432/payment_db
    username: <user>
    password: <password>
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8086
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    org.hibernate.SQL: WARN
