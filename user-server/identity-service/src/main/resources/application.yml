spring:
  config:
    import: "optional:file:${user.dir}/.env[.properties]"
  application:
    name: identity-service

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:user_db}?useSSL=false&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:160525}
    driver-class-name: com.mysql.cj.jdbc.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/pharmacy}

server:
  port: ${SERVER_PORT:7070}

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:pharmacy}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  client-id: ${KEYCLOAK_CLIENT_ID:pharmacy-app}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:G6Z8zQp4S9yV2W5vB7n3m1X0kC8jL5hR}

identity:
  jwt:
    secret: ${IDENTITY_JWT_SECRET:dev-secret-change-me}
    issuer: ${IDENTITY_JWT_ISSUER:http://localhost:7070}
    expires-minutes: ${IDENTITY_JWT_EXPIRES:120}

management:
  endpoints:
    web:
      exposure:
        include: health,info
