spring:
  config:
    import: optional:configserver:http://config-server:8888
  application:
    name: admin-bff-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/pharmacy}
    keycloak:
      roles-source: realm
      client-id: pharmacy-app
server:
  port: ${SERVER_PORT:7010}
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
services:
  user:
    url: http://localhost:7016
  order:
    url: http://localhost:7019
