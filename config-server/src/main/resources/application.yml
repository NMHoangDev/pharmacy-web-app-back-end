server:
  port: 8888

spring:
  application:
    name: config-server
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  cloud:
    config:
      server:
        git:
          uri: https://github.com/NMHoangDev/config-repo.git
          clone-on-start: true
          default-label: main

management:
  endpoints:
    web:
      exposure:
        include: health,info,busrefresh,monitor
