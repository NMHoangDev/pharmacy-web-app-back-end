services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "160525"
      MYSQL_ROOT_HOST: "%"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p160525"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-net

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - app-net

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-net

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    environment:
      SPRING_APPLICATION_NAME: gateway-service
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://host.docker.internal:8180/realms/pharmacy
      SERVER_SSL_ENABLED: "false"
      SERVER_HTTP2_ENABLED: "false"
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8087/actuator/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      config-server:
        condition: service_healthy
      admin-bff-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      branch-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      discount-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      pharmacist-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - app-net

  admin-bff-service:
    build:
