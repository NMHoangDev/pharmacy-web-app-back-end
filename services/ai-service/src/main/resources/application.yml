spring:
  config:
    import:
      - optional:configserver:http://config-server:8888
      - "optional:file:${user.dir}/.env[.properties]"
      - "optional:file:${user.dir}/../.env[.properties]"
      - "optional:file:${user.dir}/../../.env[.properties]"
  application:
    name: ai-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/pharmacy}
  datasource:
    url: ${AI_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${AI_DATASOURCE_USERNAME:root}
    password: ${AI_DATASOURCE_PASSWORD:160525}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        type:
          preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
server:
  port: ${AI_SERVER_PORT:${SERVER_PORT:7036}}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
  endpoint:
    health:
      probes:
        enabled: true

security:
  keycloak:
    roles-source: ${KEYCLOAK_ROLES_SOURCE:realm}
    client-id: ${KEYCLOAK_CLIENT_ID:pharmacy-app}

services:
  catalog:
    url: ${CATALOG_SERVICE_URL:http://localhost:7017}
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:7018}
  branch:
    url: ${BRANCH_SERVICE_URL:http://localhost:7030}

ai:
  llm:
    enabled: ${AI_LLM_ENABLED:true}
    provider: ${AI_LLM_PROVIDER:gemini}
    base-url: ${AI_LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:gemini-2.0-flash-lite}
    fallback-models: ${AI_LLM_FALLBACK_MODELS:gemini-2.0-flash,gemini-2.5-flash-lite,gemini-2.5-flash}
  knowledge:
    python-executable: ${AI_KNOWLEDGE_PYTHON_EXECUTABLE:D:/pharmacy-app/AI/.venv/Scripts/python.exe}
    script-path: ${AI_KNOWLEDGE_SCRIPT_PATH:D:/pharmacy-app/web-app/back-end/pharmacy-app/services/ai-service/scripts/query_kb.py}
    db-path: ${AI_KNOWLEDGE_DB_PATH:D:/pharmacy-app/AI/db}
    data-dir: ${AI_KNOWLEDGE_DATA_DIR:D:/pharmacy-app/AI/data/medical}
    collection: ${AI_KNOWLEDGE_COLLECTION:medical_kb}
    top-k: ${AI_KNOWLEDGE_TOP_K:4}
    timeout-seconds: ${AI_KNOWLEDGE_TIMEOUT_SECONDS:20}
    cache-ttl-seconds: ${AI_KNOWLEDGE_CACHE_TTL_SECONDS:600}
    failure-cooldown-seconds: ${AI_KNOWLEDGE_FAILURE_COOLDOWN_SECONDS:30}
