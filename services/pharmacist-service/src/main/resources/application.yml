spring:
  config:
    import: optional:configserver:http://config-server:8888
  application:
    name: pharmacist-service
  data:
    redis:
      host: localhost
      port: 6380
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/pharmacist_db
    username: root
    password: 160525
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/pharmacy}
server:
  port: ${SERVER_PORT:7025}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
logging:
  level:
    org.hibernate.SQL: WARN
branch:
  base-url: ${BRANCH_SERVICE_BASE_URL:http://localhost:7030}
  staff-cache-ttl-seconds: ${BRANCH_STAFF_CACHE_TTL_SECONDS:60}
pos:
  catalog-service:
    base-url: ${POS_CATALOG_SERVICE_BASE_URL:http://localhost:7017}
  inventory-service:
    base-url: ${POS_INVENTORY_SERVICE_BASE_URL:http://localhost:7018}
