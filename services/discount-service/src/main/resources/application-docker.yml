spring:
  application:
    name: discount-service
  datasource:
    url: jdbc:mysql://${DISCOUNT_DB_HOST:mysql}:${DISCOUNT_DB_PORT:3306}/discount_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DISCOUNT_DB_USER:root}
    password: ${DISCOUNT_DB_PASS:160525}

server:
  port: 7035

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
