spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${USER_DB_HOST:mysql}:${USER_DB_PORT:3306}/user_db
    username: ${USER_DB_USER:root}
    password: ${USER_DB_PASS:160525}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 7016

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
  endpoint:
    health:
      probes:
        enabled: true
