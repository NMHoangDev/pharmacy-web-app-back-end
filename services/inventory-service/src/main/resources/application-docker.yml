spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:mysql://${INVENTORY_DB_HOST:mysql}:${INVENTORY_DB_PORT:3306}/inventory_db
    username: ${INVENTORY_DB_USER:root}
    password: ${INVENTORY_DB_PASS:160525}

server:
  port: 7018

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
  endpoint:
    health:
      probes:
        enabled: true

inventory:
  branch-service:
    base-url: ${BRANCH_SERVICE_URL:http://branch-service:7030}
  catalog-service:
    base-url: ${CATALOG_SERVICE_URL:http://catalog-service:7017/api/catalog}
