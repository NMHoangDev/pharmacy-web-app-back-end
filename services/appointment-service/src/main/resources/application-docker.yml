spring:
  application:
    name: appointment-service
  datasource:
    url: jdbc:mysql://${APPOINTMENT_DB_HOST:mysql}:${APPOINTMENT_DB_PORT:3306}/appointment_db
    username: ${APPOINTMENT_DB_USER:root}
    password: ${APPOINTMENT_DB_PASS:160525}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

server:
  port: 7024

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
  endpoint:
    health:
      probes:
        enabled: true

eureka:
  client:
    enabled: false

branch:
  base-url: ${BRANCH_SERVICE_BASE_URL:http://branch-service:7030}

services:
  user:
    url: ${USER_SERVICE_URL:http://user-service:7016}
  pharmacist:
    url: ${PHARMACIST_SERVICE_URL:http://pharmacist-service:7025}
